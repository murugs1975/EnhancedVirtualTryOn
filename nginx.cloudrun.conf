worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Use /tmp for writable paths (Cloud Run container filesystem)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;
    access_log            /tmp/nginx_access.log;
    error_log             /tmp/nginx_error.log;

    sendfile on;
    keepalive_timeout 65;

    # Allow large file uploads (person + cloth images)
    client_max_body_size 50M;

    # Longer timeouts for model inference (~60s on CPU)
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;

    server {
        # PORT is substituted at runtime by start-cloudrun.sh
        listen NGINX_PORT;

        # --- API routes → FastAPI backend (port 8000) ---
        location = /health {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }

        location = /model-status {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
        }

        location = /tryon-simple {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        location = /tryon {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        location = /tryon-npy {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        location = /pipeline-preview {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_read_timeout 600s;
        }

        # --- Frontend routes → Next.js (port 3000) ---
        location /_next {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
